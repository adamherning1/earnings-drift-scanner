name: earnings-scanner-api
region: nyc1
services:
- name: api
  github:
    repo: adamherning1/earnings-drift-scanner
    branch: main
    deploy_on_push: true
  source_dir: api
  environment_slug: python
  build_command: pip install -r requirements.txt
  run_command: gunicorn app.main:app --bind 0.0.0.0:8000
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: PYTHON_VERSION
    value: "3.11"