name: earnings-scanner-api
region: nyc1
services:
- name: web
  github:
    repo: adamherning1/earnings-drift-scanner
    branch: main
    deploy_on_push: true
  source_dir: api
  dockerfile_path: Dockerfile
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  health_check:
    http_path: /