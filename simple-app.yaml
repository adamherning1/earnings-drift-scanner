name: earnings-drift-scanner
region: nyc
services:
  - name: api
    github:
      repo: adamherning1/earnings-drift-scanner
      branch: main
      deploy_on_push: true
    source_dir: api
    dockerfile_path: api/Dockerfile
    http_port: 8000
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: "redis://localhost:6379"
      - key: SECRET_KEY
        scope: RUN_TIME
        value: "mxfXpihSCcb12WdVZ6DYluQAFHTGvIqy"

databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1