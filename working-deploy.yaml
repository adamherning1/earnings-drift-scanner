name: earnings-drift-scanner
region: nyc1
services:
- name: api
  github:
    repo: adamherning1/earnings-drift-scanner
    branch: main
    deploy_on_push: true
  source_dir: api
  environment_slug: python
  run_command: gunicorn app.main:app --bind 0.0.0.0:8000 --worker-class uvicorn.workers.UvicornWorker
  build_command: pip install -r requirements.txt
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: DATABASE_URL
    value: "sqlite:///./earnings.db"
  - key: SECRET_KEY
    value: "mxfXpihSCcb12WdVZ6DYluQAFHTGvIqy"
  - key: REDIS_URL
    value: "redis://localhost:6379"