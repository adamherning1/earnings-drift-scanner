name: earnings-drift-scanner
region: nyc
services:
  - name: api
    github:
      repo: YOUR_GITHUB_USERNAME/earnings-drift-scanner
      branch: main
      deploy_on_push: true
    source_dir: api
    dockerfile_path: api/Dockerfile
    http_port: 8000
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.DATABASE_URL}
    
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/earnings-drift-scanner
      branch: main
      deploy_on_push: true
    source_dir: web
    build_command: npm run build
    environment_slug: node-js
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ${api.PUBLIC_URL}

databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1

  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-dev-database
    num_nodes: 1