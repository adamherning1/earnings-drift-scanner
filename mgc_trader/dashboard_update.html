<!DOCTYPE html>
<html>
<head>
    <title>MGC Trading Dashboard</title>
    <meta http-equiv="refresh" content="10">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        .position-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #4CAF50;
        }
        .position-title {
            font-size: 20px;
            color: #4CAF50;
            margin-bottom: 15px;
        }
        .position-detail {
            margin: 10px 0;
            font-size: 18px;
        }
        .label {
            color: #888;
            display: inline-block;
            width: 120px;
        }
        .value {
            color: #fff;
            font-weight: bold;
        }
        .contracts {
            color: #2196F3;
            font-size: 24px;
        }
        .entry-price {
            color: #FFC107;
            font-size: 22px;
        }
        .status {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-top: 20px;
        }
        .connected {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="header">MGC Trading Dashboard - LIVE POSITION</div>
    
    <div class="position-card">
        <div class="position-title">OPEN POSITION - MGCM6 (June 2026 Gold)</div>
        
        <div class="position-detail">
            <span class="label">Contracts:</span>
            <span class="value contracts">2 LONG</span>
        </div>
        
        <div class="position-detail">
            <span class="label">Entry Price:</span>
            <span class="value entry-price">$4,686.50</span>
        </div>
        
        <div class="position-detail">
            <span class="label">Entry Time:</span>
            <span class="value">~9:28 AM PT</span>
        </div>
        
        <div class="position-detail">
            <span class="label">Strategy:</span>
            <span class="value">Adaptive Trading Bot</span>
        </div>
        
        <div class="position-detail">
            <span class="label">Stop Loss:</span>
            <span class="value">Active (managed by bot)</span>
        </div>
    </div>
    
    <div class="status">
        <span class="connected">✓ BOT CONNECTED</span> | 
        Last Update: <span id="time"></span>
    </div>
    
    <script>
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleTimeString();
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
