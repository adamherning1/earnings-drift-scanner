name: earnings-drift-scanner
region: nyc1
services:
- name: api
  environment_slug: python
  github:
    repo: adamherning1/earnings-drift-scanner
    branch: main
    deploy_on_push: true
  http_port: 8000
  instance_size_slug: basic-xxs
  run_command: cd api && pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000
  source_dir: /