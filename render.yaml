services:
  # Main API Service
  - type: web
    name: drift-scanner-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd api && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: FMP_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: drift-scanner-db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

  # Background Scanner Service
  - type: worker
    name: earnings-scanner
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd api && python scanner_worker.py"
    envVars:
      - key: FMP_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: drift-scanner-db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

  # Paper Trading Updater
  - type: cron
    name: position-updater
    runtime: python
    schedule: "*/5 * * * *"  # Every 5 minutes
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd api && python update_positions.py"
    envVars:
      - key: FMP_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: drift-scanner-db
          property: connectionString

databases:
  - name: drift-scanner-db
    plan: starter  # $7/month
    databaseName: driftscanner
    user: driftuser